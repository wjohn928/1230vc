<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1230.vc</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f0eb;
      color: #1a1a2e;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .spacer { flex: 1; }

    #canvas-container {
      flex: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 0;
    }

    #canvas-container canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    .bottom {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      padding-bottom: 40px;
    }

    .firm-name {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #1a1a2e;
    }

    .info-link {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a2e;
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: none;
      border: none;
      font-family: inherit;
    }

    .info-link:hover { color: #b71c1c; }

    /* Info overlay */
    .info-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 46, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 100;
    }

    .info-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .info-content {
      text-align: center;
      color: #fff;
      max-width: 520px;
      padding: 24px;
    }

    .info-content h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    .info-content p {
      font-size: 17px;
      line-height: 1.8;
      color: #a0a0b8;
      margin-bottom: 32px;
    }

    .info-content a {
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 500;
    }

    .info-content a:hover { color: #b71c1c; }

    .close-btn {
      position: absolute;
      top: 32px;
      right: 32px;
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 300;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover { color: #b71c1c; }

    @media (max-width: 768px) {
      .info-content h2 { font-size: 24px; }
      .info-content p { font-size: 15px; }
    }
  </style>
</head>
<body>

  <div class="spacer"></div>

  <div id="canvas-container"></div>

  <div class="bottom">
    <div class="firm-name">1230 Ventures</div>
    <button class="info-link" onclick="toggleInfo()">Info</button>
  </div>

  <div class="info-overlay" id="infoOverlay">
    <button class="close-btn" onclick="toggleInfo()">&times;</button>
    <div class="info-content">
      <h2>Funding the Future</h2>
      <p>1230 Ventures backs high-conviction opportunities through both primary and secondary investments. We believe the best businesses see what others don't, and we're here to help them get there.</p>
      <a href="mailto:hello@1230.vc">hello@1230.vc</a>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Info overlay
    function toggleInfo() {
      document.getElementById('infoOverlay').classList.toggle('active');
    }

    // Three.js setup
    const container = document.getElementById('canvas-container');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
    camera.position.set(0, 1.5, 18);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0);
    container.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
    mainLight.position.set(5, 8, 10);
    scene.add(mainLight);

    const fillLight = new THREE.DirectionalLight(0xddeeff, 0.3);
    fillLight.position.set(-5, 2, -5);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 0.2);
    rimLight.position.set(0, -5, -10);
    scene.add(rimLight);

    // Materials
    const redMat = new THREE.MeshPhongMaterial({
      color: 0xb71c1c,
      specular: 0x441111,
      shininess: 60,
      flatShading: false
    });

    const blueMat = new THREE.MeshPhongMaterial({
      color: 0x1565c0,
      specular: 0x112244,
      shininess: 60,
      flatShading: false
    });

    const whiteMat = new THREE.MeshPhongMaterial({
      color: 0xf0f0f0,
      specular: 0x333333,
      shininess: 80,
      flatShading: false
    });

    // Build numbers from rounded 3D boxes
    const group = new THREE.Group();
    const radius = 0.08; // corner radius

    function makeRoundedRect(w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      const shape = new THREE.Shape();
      shape.moveTo(-w/2 + r, -h/2);
      shape.lineTo(w/2 - r, -h/2);
      shape.quadraticCurveTo(w/2, -h/2, w/2, -h/2 + r);
      shape.lineTo(w/2, h/2 - r);
      shape.quadraticCurveTo(w/2, h/2, w/2 - r, h/2);
      shape.lineTo(-w/2 + r, h/2);
      shape.quadraticCurveTo(-w/2, h/2, -w/2, h/2 - r);
      shape.lineTo(-w/2, -h/2 + r);
      shape.quadraticCurveTo(-w/2, -h/2, -w/2 + r, -h/2);
      return shape;
    }

    function addBox(x, y, w, h, d, material) {
      const shape = makeRoundedRect(w, h, radius);
      const geo = new THREE.ExtrudeGeometry(shape, {
        depth: d,
        bevelEnabled: true,
        bevelThickness: 0.03,
        bevelSize: 0.03,
        bevelSegments: 3
      });
      geo.center();
      const mesh = new THREE.Mesh(geo, material);
      mesh.position.set(x + w/2, -(y + h/2), 0);
      group.add(mesh);
    }

    const t = 0.4;  // thickness of bars
    const bh = 2.2; // total height of digits
    const bw = 1.4; // total width of digits
    const d = 1.0;  // depth (extrusion)
    const gap = 0.5; // gap between digits

    // Calculate total width to center
    const digitWidths = [0.5, bw, bw, bw]; // 1 is narrower
    const totalWidth = digitWidths.reduce((a,b) => a+b, 0) + gap * 3;
    let cx = -totalWidth / 2;

    // ---- "1" ---- (red)
    const w1 = 0.5;
    // vertical bar
    addBox(cx, 0, t, bh, d, redMat);
    // base
    addBox(cx - 0.15, bh - t, w1 + 0.15, t, d, redMat);
    // top serif
    addBox(cx - 0.3, 0, t + 0.3, t, d, redMat);
    cx += w1 + gap;

    // ---- "2" ---- (white)
    // top bar
    addBox(cx, 0, bw, t, d, whiteMat);
    // right bar (upper)
    addBox(cx + bw - t, 0, t, bh/2 + t/2, d, whiteMat);
    // middle bar
    addBox(cx, bh/2 - t/2, bw, t, d, whiteMat);
    // left bar (lower)
    addBox(cx, bh/2 - t/2, t, bh/2 + t/2, d, whiteMat);
    // bottom bar
    addBox(cx, bh - t, bw, t, d, whiteMat);
    cx += bw + gap;

    // ---- "3" ---- (red)
    // top bar
    addBox(cx, 0, bw, t, d, redMat);
    // right bar full
    addBox(cx + bw - t, 0, t, bh, d, redMat);
    // middle bar
    addBox(cx, bh/2 - t/2, bw, t, d, redMat);
    // bottom bar
    addBox(cx, bh - t, bw, t, d, redMat);
    cx += bw + gap;

    // ---- "0" ---- (blue) - slightly narrower to read as 0 not D
    const ow = bw * 0.85; // narrower than other digits
    const oOffset = (bw - ow) / 2; // center it in the same width slot
    // top bar
    addBox(cx + oOffset, 0, ow, t, d, blueMat);
    // bottom bar
    addBox(cx + oOffset, bh - t, ow, t, d, blueMat);
    // left bar
    addBox(cx + oOffset, 0, t, bh, d, blueMat);
    // right bar
    addBox(cx + oOffset + ow - t, 0, t, bh, d, blueMat);

    // Center the group vertically
    group.position.y = bh / 2;

    scene.add(group);

    // Drag-to-rotate interaction
    let isDragging = false;
    let previousX = 0;
    let previousY = 0;
    let velocityX = 0;
    let velocityY = 0;
    let targetRotX = 0;
    let targetRotY = 0;

    const canvas = renderer.domElement;
    canvas.style.cursor = 'grab';

    function onPointerDown(e) {
      isDragging = true;
      canvas.style.cursor = 'grabbing';
      const point = e.touches ? e.touches[0] : e;
      previousX = point.clientX;
      previousY = point.clientY;
      velocityX = 0;
      velocityY = 0;
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const point = e.touches ? e.touches[0] : e;
      const dx = point.clientX - previousX;
      const dy = point.clientY - previousY;
      velocityX = dx * 0.005;
      velocityY = dy * 0.005;
      targetRotY += dx * 0.005;
      targetRotX += dy * 0.005;
      targetRotX = Math.max(-Math.PI / 4, Math.min(Math.PI / 4, targetRotX));
      previousX = point.clientX;
      previousY = point.clientY;
    }

    function onPointerUp() {
      isDragging = false;
      canvas.style.cursor = 'grab';
    }

    canvas.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);
    canvas.addEventListener('touchstart', onPointerDown, { passive: false });
    window.addEventListener('touchmove', onPointerMove, { passive: false });
    window.addEventListener('touchend', onPointerUp);

    // Animate with momentum + idle horizontal spin
    const idleSpeed = 0.005;

    function animate() {
      requestAnimationFrame(animate);
      if (!isDragging) {
        velocityX *= 0.97;
        velocityY *= 0.97;
        targetRotY += velocityX;
        targetRotX += velocityY;
        targetRotX = Math.max(-Math.PI / 4, Math.min(Math.PI / 4, targetRotX));
        if (Math.abs(velocityX) < 0.0001) {
          targetRotY += idleSpeed;
        }
      }
      group.rotation.y += (targetRotY - group.rotation.y) * 0.1;
      group.rotation.x += (targetRotX - group.rotation.x) * 0.1;
      renderer.render(scene, camera);
    }
    animate();

    // Handle resize
    window.addEventListener('resize', () => {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });
  </script>
</body>
</html>
